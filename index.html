<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>HelloFresh & Factor CC Spiel Guide & Smart KIRO Scanner</title>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-main: #f8f9fa; --bg-card: #ffffff; --text-main: #1f2937;
    --text-muted: #6b7280; --border: #e5e7eb; --bg-hover: #f3f4f6;
    --accent: #ec4899;
  }
  body.theme-dark { --bg-main: #0d1117; --bg-card: #161b22; --text-main: #f3f4f6; --text-muted: #9ca3af; --border: #30363d; --bg-hover: #21262d; }
  body.region-smesarah { --accent: #ec4899; }
  body.region-nordics   { --accent: #3b82f6; }
  body.region-dach      { --accent: #ef4444; }
  body.region-benelux   { --accent: #10b981; }
  body.region-factorde  { --accent: #f59e0b; }
  body.region-factordk  { --accent: #8b5cf6; }
  body.region-factorse  { --accent: #d946ef; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Public Sans', system-ui, sans-serif; background: var(--bg-main); color: var(--text-main); font-size: 14px; min-height: 100vh; transition: background 0.3s ease, color 0.3s ease; }

  /* HEADER */
  .header { background: var(--bg-card); padding: 18px 30px 0; border-bottom: 4px solid var(--accent); transition: background 0.3s ease, border-color 0.3s ease; }
  .headerTop { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
  .logo { background: var(--bg-main); color: var(--text-main); font-weight: 700; font-size: 16px; letter-spacing: 2px; padding: 8px 18px; border-radius: 8px; border: 1px solid var(--border); }
  .headerTitle { font-size: 17px; font-weight: 600; color: var(--text-main); }
  .headerSub { font-size: 13.5px; margin-left: auto; color: var(--text-muted); font-weight: 500; display: flex; align-items: center; }
  .themeToggleBtn { background: var(--bg-main); color: var(--text-main); border: 1px solid var(--border); padding: 6px 12px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; margin-left: 16px; transition: all 0.2s ease; }
  .themeToggleBtn:hover { background: var(--bg-hover); border-color: var(--accent); }

  /* TABS */
  .countryTabs { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
  .ctab { padding: 10px 18px; border-radius: 12px 12px 0 0; font-size: 14px; font-weight: 700; cursor: pointer; border: 1px solid transparent; border-bottom: none; display: flex; flex-direction: column; gap: 2px; background: transparent; color: var(--text-muted); font-family: inherit; transition: all 0.2s ease; }
  .ctab:hover { color: var(--text-main); background: var(--bg-hover); }
  .ctab.active { background: var(--accent); color: #ffffff; border-color: var(--accent); }

  /* LAYOUT */
  .main { display: flex; height: calc(100vh - 105px); overflow: hidden; }
  .sidebar { width: 260px; min-width: 260px; background: var(--bg-card); border-right: 1px solid var(--border); overflow-y: auto; padding: 24px 0; }
  .sidebarItem { display: block; padding: 12px 24px; font-size: 14px; cursor: pointer; color: var(--text-main); border-left: 4px solid transparent; font-weight: 500; }
  .sidebarItem:hover { background: var(--bg-hover); color: var(--accent); }
  .sidebarItem.active { background: var(--bg-hover); border-left-color: var(--accent); color: var(--accent); font-weight: 700; }
  .content { flex: 1; overflow-y: auto; padding: 0; background: var(--bg-main); }

  /* SPIEL PANELS */
  .panelWrap { padding: 32px 36px 80px; display: none; }
  .panelWrap.active { display: block; }
  .spielSection { margin-bottom: 24px; background: var(--bg-card); border-radius: 10px; border: 1px solid var(--border); overflow: hidden; }
  .sectionHeader { display: flex; align-items: center; gap: 16px; padding: 18px 24px; cursor: pointer; background: var(--bg-card); }
  .sectionHeader h2 { font-size: 15px; font-weight: 700; color: var(--text-main); text-transform: uppercase; letter-spacing: 1px; flex: 1; }
  .sectionBody { display: none; padding: 24px; gap: 16px; flex-direction: column; background: var(--bg-main); }
  .sectionBody.open { display: flex; }
  .spielCard { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 20px 24px; position: relative; }
  .spielLabel { font-size: 11.5px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 12px; }
  .spielText { font-size: 14.5px; line-height: 1.7; color: var(--text-main); white-space: pre-wrap; padding-right: 70px; }
  .copyBtn { position: absolute; top: 20px; right: 24px; background: var(--bg-main); border: 1px solid var(--border); border-radius: 6px; padding: 6px 16px; font-size: 13px; font-weight: 600; color: var(--text-muted); cursor: pointer; }
  .copyBtn:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* SMART OFFLINE KIRO BUILDER */
  .kiro-wrapper { font-family: 'Public Sans', sans-serif; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 24px; margin-bottom: 30px; margin-top: 20px; }
  .kiro-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .kiro-title { font-size: 14px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-main); display: flex; align-items: center; gap: 8px; }
  .kiro-badge { font-size: 10px; font-weight: 800; letter-spacing: 1px; background: var(--accent); color: white; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; }
  .kiro-offline-pill { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 6px; background: #3b82f620; color: #3b82f6; border: 1px solid #3b82f650; }
  
  .kiro-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  @media (max-width: 1000px) { .kiro-grid { grid-template-columns: 1fr; } }
  
  .kiro-left { display: flex; flex-direction: column; gap: 16px; }
  .kiro-right { display: flex; flex-direction: column; gap: 16px; background: var(--bg-main); padding: 20px; border-radius: 8px; border: 1px solid var(--border); }
  
  .kiro-form-group { display: flex; flex-direction: column; gap: 6px; }
  .kiro-label { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
  
  .kiro-transcript-box { width: 100%; border: 1.5px dashed var(--accent); border-radius: 8px; padding: 14px; font-family: inherit; font-size: 13.5px; color: var(--text-main); background: var(--bg-main); outline: none; transition: border-color 0.2s; min-height: 120px; resize: vertical; }
  .kiro-transcript-box:focus { background: var(--bg-card); border-style: solid; }
  
  .kiro-select, .kiro-input { width: 100%; border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; font-family: inherit; font-size: 13.5px; color: var(--text-main); background: var(--bg-card); outline: none; }
  .kiro-textarea { width: 100%; border: 1px solid var(--border); border-radius: 6px; padding: 10px 12px; resize: vertical; font-family: inherit; font-size: 13.5px; color: var(--text-main); background: var(--bg-card); outline: none; min-height: 60px; }
  
  .kiro-btn-row { display: flex; gap: 10px; margin-top: 8px; }
  .kiro-btn { padding: 12px 20px; border-radius: 8px; font-size: 13.5px; font-weight: 700; cursor: pointer; border: none; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.2s; }
  .kiro-btn-primary { background: var(--accent); color: white; flex: 1; }
  .kiro-btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
  .kiro-btn-ghost { background: transparent; color: var(--text-muted); border: 1px solid var(--border); }
  .kiro-btn-ghost:hover { border-color: var(--text-main); color: var(--text-main); }
  .kiro-btn-success { background: #10b981; color: white; width: 100%; margin-top: 10px; }
  .kiro-btn-success:hover { background: #059669; }

  .scan-notice { font-size: 12px; color: var(--accent); font-weight: 600; text-align: center; margin-top: 5px; min-height: 18px; }
</style>
</head>
<body class="theme-dark region-smesarah">

<div class="header">
  <div class="headerTop">
    <div class="logo" id="mainLogo" style="display:none;">HELLOFRESH</div>
    <div class="headerTitle">Customer Care Spiel Guide</div>
    <div class="headerSub">
      Property of SME Sarah <span class="sep">|</span> Internal Use Only <span class="sep">|</span>
      Last edited: 04 Apr 2026
    </div>
    <button id="themeToggle" class="themeToggleBtn" onclick="toggleTheme()">☀️ Light Mode</button>
  </div>
  <div class="countryTabs">
    <button class="ctab active" onclick="switchRegion('smesarah')">SME Sarah</button>
    <button class="ctab" onclick="switchRegion('nordics')">NORDICS</button>
    <button class="ctab" onclick="switchRegion('dach')">DACH</button>
    <button class="ctab" onclick="switchRegion('factorde')">FACTOR DE</button>
  </div>
</div>

<div class="main">
  <div class="sidebar" id="sidebar"></div>
  <div class="content">

    <div class="panelWrap active" id="panelSmesarah">
      <div class="kiro-wrapper">
        <div class="kiro-header">
          <div class="kiro-title">🤖 Offline Smart KIRO Scanner <span class="kiro-badge">KIRO</span></div>
          <div class="kiro-offline-pill">100% Offline • No API</div>
        </div>
        
        <div class="kiro-grid">
          <div class="kiro-left">
            <div class="kiro-form-group">
              <label class="kiro-label">1. Paste Conversation Transcript</label>
              <textarea id="kiroTranscript" class="kiro-transcript-box" placeholder="Paste the customer chat or call transcript here..."></textarea>
            </div>
            <button class="kiro-btn kiro-btn-primary" onclick="scanTranscript()">🔍 Auto-Scan & Fill Details</button>
            <div class="scan-notice" id="scanNotice"></div>
          </div>

          <div class="kiro-right">
            <div style="display: flex; gap: 12px;">
                <div class="kiro-form-group" style="flex: 1;">
                  <label class="kiro-label">Wrap Code</label>
                  <select id="kiroWrapCode" class="kiro-select" onchange="populateKeywords()"></select>
                </div>
                <div class="kiro-form-group" style="flex: 1;">
                  <label class="kiro-label">Keyword</label>
                  <select id="kiroKeyword" class="kiro-select"></select>
                </div>
            </div>
            
            <div class="kiro-form-group">
              <label class="kiro-label">K - Contact Reason</label>
              <input type="text" id="kiroK" class="kiro-input" placeholder="Customer contacted to...">
            </div>
            
            <div class="kiro-form-group">
              <label class="kiro-label">I - Issue Details</label>
              <textarea id="kiroI" class="kiro-textarea" placeholder="Detail the specific issue..."></textarea>
            </div>
            
            <div class="kiro-form-group">
              <label class="kiro-label">R - Resolution Steps</label>
              <textarea id="kiroR" class="kiro-textarea" placeholder="What actions did you take?"></textarea>
            </div>
            
            <div class="kiro-form-group">
              <label class="kiro-label">O - Outcome</label>
              <input type="text" id="kiroO" class="kiro-input" placeholder="e.g. Refund processed, resolved.">
            </div>

            <div class="kiro-btn-row">
              <button class="kiro-btn kiro-btn-success" id="kiroCopyBtn" onclick="copyKIRO()">⊕ Copy KIRO Notes</button>
              <button class="kiro-btn kiro-btn-ghost" onclick="resetKIRO()">Clear</button>
            </div>
          </div>
        </div>
      </div>
      
      <div id="spielsContainer"></div>
    </div>
  </div>
</div>

<script>
function toggleTheme() {
  document.body.classList.toggle('theme-dark');
  document.getElementById('themeToggle').textContent = document.body.classList.contains('theme-dark') ? '☀️ Light Mode' : '🌙 Dark Mode';
}

function switchRegion(code) {
  document.querySelectorAll('.ctab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.body.className = document.body.className.replace(/region-\w+/g,'');
  document.body.classList.add('region-'+code);
  const logoEl=document.getElementById('mainLogo');
  if(code.startsWith('factor')){logoEl.style.display='block';logoEl.textContent='FACTOR';}
  else if(code==='smesarah'){logoEl.style.display='none';}
  else{logoEl.style.display='block';logoEl.textContent='HELLOFRESH';}
}

// =============================================
// OFFLINE KIRO SCANNER LOGIC
// =============================================
const wrapCodeData = {
  "Account - 1st Box Change / Question": ["Educate", "Box Type", "Cancellation", "Delivery Address", "Delivery Day", "Other"],
  "Account - After deadline change request": ["Address Change", "Box Type Change", "Cancellation Possible", "Cancellation Not Possible", "LMC", "Refund"],
  "Account - Cancellation - Customer Not Retained": ["Account Management Issues", "Can't Afford", "Delivery Issues", "Didn't Like Meals", "Pricing/Discount Issues"],
  "Account - Cancellation - Retained Customer": ["Account Management Issues", "Can't Afford", "Delivery Issues", "Didn't Like Meals"],
  "Account - Data Protection": ["Account Removal", "Data Protection", "Deletion Request", "Subject Access Request"],
  "Account - Meal Swap / Recipe Preference": ["Add On", "Customisation", "Meal Selection", "Meal Swap"],
  "Account - Skip/Unskip": ["Pause", "Unpause", "Confirmation"],
  "Complaint - Food Safety": ["Allergy", "Foreign Object", "Food Poisoning", "Sickness"],
  "Complaint - Logistic - Courier company": ["Driver Behaviour", "Property damage", "Instructions not followed", "Leave Safe"],
  "Complaint - Logistics - Early/Late": ["Early 1 Day", "Late 1 Day", "Late 2 Day"],
  "Complaint - Logistics - Failed delivery": ["Failed", "Misrouted", "No Delivery"],
  "Complaint - Pick & Pack": ["Incorrect", "Substitution", "Missing", "Wrong Portion/Size"],
  "Complaint - Quality": ["Damage", "Ice Packs", "Leaking/Spilled", "Mould", "Open", "Spoiled", "Wilted"],
  "Payments - Charge breakdown": ["Add-On", "Breakdown", "Charge", "Double Charge", "Incorrect Charge"],
  "Payments - Credit/Refund": ["Credit", "Refund"],
  "Payments - Outstanding/Dunning": ["Failed Payment", "Insufficient Funds", "Outstanding Balance", "Dunning"]
};

// Keyword mapping rules for the offline scanner
const scanRules = [
  { match: ["cancel", "close account", "stop subscription"], code: "Account - Cancellation - Customer Not Retained", kw: "Didn't Like Meals", defaultK: "Customer contacted to cancel their subscription." },
  { match: ["pause", "skip", "unskip", "away next week"], code: "Account - Skip/Unskip", kw: "Pause", defaultK: "Customer contacted to skip their upcoming box." },
  { match: ["missing", "forgot ingredient", "didn't receive the chicken", "not in the box"], code: "Complaint - Pick & Pack", kw: "Missing", defaultK: "Customer contacted to report missing ingredients in their recent delivery." },
  { match: ["rotten", "mould", "wilted", "spoiled", "bad meat", "smelly"], code: "Complaint - Quality", kw: "Spoiled", defaultK: "Customer contacted to report poor quality / spoiled ingredients." },
  { match: ["late", "delayed", "hasn't arrived yet", "where is my box"], code: "Complaint - Logistics - Early/Late", kw: "Late 1 Day", defaultK: "Customer contacted to check on a delayed delivery." },
  { match: ["sick", "food poisoning", "vomit", "hospital", "stomach", "plastic", "glass"], code: "Complaint - Food Safety", kw: "Food Poisoning", defaultK: "Customer contacted to report illness/safety concern after consuming a meal." },
  { match: ["refund", "money back", "credit", "compensation"], code: "Payments - Credit/Refund", kw: "Refund", defaultK: "Customer contacted regarding a refund/credit request." },
  { match: ["change meal", "swap", "different recipe", "add on"], code: "Account - Meal Swap / Recipe Preference", kw: "Meal Swap", defaultK: "Customer contacted to swap meals for an upcoming order." }
];

function initKIRO() {
  const wrapSelect = document.getElementById("kiroWrapCode");
  wrapSelect.innerHTML = '<option value="">-- Select Wrap Code --</option>';
  for (const code in wrapCodeData) {
    let opt = document.createElement("option");
    opt.value = code; opt.textContent = code;
    wrapSelect.appendChild(opt);
  }
}

function populateKeywords() {
  const wrapSelect = document.getElementById("kiroWrapCode");
  const keywordSelect = document.getElementById("kiroKeyword");
  keywordSelect.innerHTML = '<option value="">-- Select Keyword --</option>';
  const selectedCode = wrapSelect.value;
  if (selectedCode && wrapCodeData[selectedCode]) {
    wrapCodeData[selectedCode].forEach(kw => {
      let opt = document.createElement("option");
      opt.value = kw; opt.textContent = kw;
      keywordSelect.appendChild(opt);
    });
  }
}

function scanTranscript() {
  const text = document.getElementById("kiroTranscript").value.toLowerCase();
  const notice = document.getElementById("scanNotice");
  if (!text) {
    notice.textContent = "Please paste a transcript first.";
    notice.style.color = "#ef4444";
    return;
  }

  let foundRule = null;
  for (let rule of scanRules) {
    for (let phrase of rule.match) {
      if (text.includes(phrase)) {
        foundRule = rule;
        break;
      }
    }
    if (foundRule) break;
  }

  if (foundRule) {
    document.getElementById("kiroWrapCode").value = foundRule.code;
    populateKeywords();
    document.getElementById("kiroKeyword").value = foundRule.kw;
    document.getElementById("kiroK").value = foundRule.defaultK;
    
    // Auto-fill a generic Outcome based on context
    if (foundRule.code.includes("Refund")) document.getElementById("kiroO").value = "Refund processed successfully.";
    else if (foundRule.code.includes("Cancellation")) document.getElementById("kiroO").value = "Account cancelled.";
    else if (foundRule.code.includes("Quality") || foundRule.code.includes("Pick")) document.getElementById("kiroO").value = "Credit applied / Issue reported.";
    else document.getElementById("kiroO").value = "Issue resolved.";

    notice.textContent = "✓ Transcript scanned! Details auto-filled. Please write the Issue and Resolution.";
    notice.style.color = "#10b981";
  } else {
    notice.textContent = "Could not detect a specific contact reason. Please select manually.";
    notice.style.color = "#f59e0b";
  }
}

function copyKIRO() {
  const wrapCode = document.getElementById("kiroWrapCode").value;
  const keyword = document.getElementById("kiroKeyword").value;
  const k = document.getElementById("kiroK").value;
  const i = document.getElementById("kiroI").value;
  const r = document.getElementById("kiroR").value;
  const o = document.getElementById("kiroO").value;

  if (!wrapCode || !keyword || !k) {
    alert("Please ensure Wrap Code, Keyword, and Contact Reason are filled.");
    return;
  }

  const kiroNotes = `Wrap Code: ${wrapCode}\nKeyword: ${keyword}\n\nK: ${k}\nI: ${i}\nR: ${r}\nO: ${o}`;
  navigator.clipboard.writeText(kiroNotes).then(() => {
    const btn = document.getElementById("kiroCopyBtn");
    btn.textContent = "✓ Copied Notes to Clipboard!";
    setTimeout(() => { btn.textContent = "⊕ Copy KIRO Notes"; }, 2000);
  });
}

function resetKIRO() {
  document.getElementById("kiroTranscript").value = "";
  document.getElementById("kiroWrapCode").value = "";
  populateKeywords();
  document.getElementById("kiroK").value = "";
  document.getElementById("kiroI").value = "";
  document.getElementById("kiroR").value = "";
  document.getElementById("kiroO").value = "";
  document.getElementById("scanNotice").textContent = "";
}

initKIRO();
</script>
</body>
</html>
